name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_BAY_0BAD40610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} 
          action: "upload"
          
          ###### Configurações de Repositório/Build ######
          
          # Localização do código fonte (raiz do repo)
          app_location: "." 
          
          # Localização da API (deixe vazio se não houver Azure Functions)
          api_location: "" 
          
          # Pasta onde o build é gerado (Ex: dist, build ou . se for HTML puro)
          output_location: "dist" 
          
          # Comando para executar o build (Adicionado para corrigir o erro Oryx)
          app_build_command: "npm run build"
          
          ###### Fim das Configurações ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_BAY_0BAD40610 }}
          action: "close"