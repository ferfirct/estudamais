name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_BAY_0BAD40610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} 
          action: "upload"
          
          ###### Configurações de Repositório/Build ######
          app_location: "."          # Onde está o package.json
          api_location: ""           # Vazio se não tiver API
          output_location: "dist"    # Pasta gerada pelo build (Vite/React)
          
          # Força o comando de build manualmente
          app_build_command: "npm install && npm run build"
          
          # Pula a detecção automática do Oryx se necessário
          skip_app_build: false
          ###### Fim das Configurações ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_BAY_0BAD40610 }}
          action: "close"