<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080d" />
    <meta name="description" content="Estuda+ — não apenas conte as horas, teste sua absorção. Cronômetro, quizzes por IA e índice de eficiência." />
    <title>Estuda+ · Teste sua absorção</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Neutral scale — layered dark surfaces
              bg: '#07080d',
              surface: '#0f111a',
              'surface-2': '#151826',
              'surface-3': '#1c2030',
              'surface-hover': '#232840',
              border: '#232740',
              'border-strong': '#323852',
              // Text
              'text-primary': '#f3f5f9',
              'text-secondary': '#c5cbd9',
              'text-muted': '#7a8199',
              'text-dim': '#565c73',
              // Accent (emerald)
              accent: '#22d3a7',
              'accent-hover': '#14b893',
              'accent-soft': 'rgba(34, 211, 167, 0.12)',
              'accent-border': 'rgba(34, 211, 167, 0.35)',
              'accent-dim': '#0a5b48',
              // Semantic
              danger: '#f43f5e',
              'danger-soft': 'rgba(244, 63, 94, 0.12)',
              warning: '#f59e0b',
              'warning-soft': 'rgba(245, 158, 11, 0.12)',
              success: '#22c55e',
              'success-soft': 'rgba(34, 197, 94, 0.12)',
              info: '#38bdf8',
              'info-soft': 'rgba(56, 189, 248, 0.12)',
            },
            fontFamily: {
              sans: ["'DM Sans'", 'system-ui', '-apple-system', 'sans-serif'],
              display: ["'Outfit'", 'system-ui', 'sans-serif'],
              mono: ["'JetBrains Mono'", 'ui-monospace', 'Consolas', 'monospace'],
            },
            fontSize: {
              '2xs': ['0.6875rem', { lineHeight: '1rem' }],
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(34,211,167,0.25), 0 10px 40px -10px rgba(34,211,167,0.35)',
              'glow-lg': '0 0 0 1px rgba(34,211,167,0.35), 0 20px 60px -12px rgba(34,211,167,0.5)',
              'card': '0 1px 0 0 rgba(255,255,255,0.04) inset, 0 20px 40px -24px rgba(0,0,0,0.8)',
              'elevated': '0 1px 0 0 rgba(255,255,255,0.06) inset, 0 30px 60px -24px rgba(0,0,0,0.9), 0 4px 16px -6px rgba(0,0,0,0.6)',
            },
            backdropBlur: {
              xs: '2px',
            },
            animation: {
              'in': 'fadeInUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both',
              'in-fast': 'fadeInUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) both',
              'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both',
              'slide-down': 'slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) both',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 3s linear infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideDown: {
                '0%': { opacity: '0', transform: 'translateY(-8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-6px)' },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-bg text-text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
